name: Sync Roblox Bio

on:
  workflow_dispatch: {}
    # ^ this lets the workflow be triggered on-demand - either by you
    # manually via the GitHub website, or by our external scheduler.

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Run sync script
        env:
          ROBLOX_COOKIE: ${{ secrets.ROBLOX_COOKIE }}
          ROBLOX_GROUP_ID: ${{ secrets.ROBLOX_GROUP_ID }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: node roblox-website-sync-bot.js
