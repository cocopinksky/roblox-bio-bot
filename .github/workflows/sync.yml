name: Sync Roblox Bio

on:
  schedule:
    # Runs every 5 minutes - the fastest interval GitHub Actions allows.
    # Actual runs may occasionally lag a few minutes behind during
    # high load on GitHub's end - that's normal and out of our control.
    - cron: '* * * * *'
  workflow_dispatch: {}
    # ^ this lets you manually trigger a run from the GitHub website too,
    # useful for testing without waiting for the schedule.

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Run sync script
        env:
          ROBLOX_COOKIE: ${{ secrets.ROBLOX_COOKIE }}
          ROBLOX_GROUP_ID: ${{ secrets.ROBLOX_GROUP_ID }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: node roblox-website-sync-bot.js
